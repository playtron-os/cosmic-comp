<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Permissive private session-bus config for `make run-debug` (dbus-run-session).

  The stock /usr/share/dbus-1/session.conf only grants *eavesdrop* receive and
  pulls in the SELinux dbus contexts; on an SELinux-enforcing host that makes a
  fresh dbus-run-session bus reject delivering method-return / NameAcquired to
  its own clients ("Rejected receive message, 0 matched rules"), so a compositor
  can never finish acquiring one.playtron.GameMode. This config grants explicit
  receive and omits the SELinux include. Dev/test only — do not ship.
-->
<busconfig>
  <type>session</type>
  <listen>unix:tmpdir=/tmp</listen>
  <standard_session_servicedirs />
  <policy context="default">
    <allow send_destination="*" eavesdrop="true"/>
    <allow receive_sender="*" eavesdrop="true"/>
    <allow own="*"/>
  </policy>
</busconfig>

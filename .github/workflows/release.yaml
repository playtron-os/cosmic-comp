name: "🎉 Release"

on:
  workflow_dispatch:
    inputs: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # 1. Decide whether a release is needed and what version it will be, without
  #    building anything. A semantic-release dry-run reads the commit history and
  #    prints the next version; we gate the rest of the pipeline on it.
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      publish: ${{ steps.sr.outputs.publish }}
      version: ${{ steps.sr.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install @semantic-release/exec @semantic-release/git @semantic-release/changelog @semantic-release/github
      - id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          npx semantic-release --dry-run 2>&1 | tee sr.log || true
          VERSION=$(grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' sr.log | tail -n1 || true)
          if [ -n "$VERSION" ]; then
            echo "Next release version: $VERSION"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          elif grep -qi "no relevant changes" sr.log; then
            echo "No release will be created - no relevant changes found"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::semantic-release dry-run failed unexpectedly (see log above)"
            exit 1
          fi

  # 2. Build each architecture's RPM in parallel, on its own runner. Each job
  #    frees disk space, caches the cargo registry, and has a hard timeout so a
  #    hang fails fast instead of burning the 6h default.
  build:
    name: Build RPM (${{ matrix.arch }})
    needs: version
    if: needs.version.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      # Stock ubuntu-latest has ~14GB free; two target dirs + the docker image
      # + RPM staging overflow it and kill the compile mid-flight. This reclaims ~25GB.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Task
        uses: go-task/setup-task@v1
      # The build runs inside docker with CARGO_HOME=.cache/home/.cargo (bind-mounted),
      # so caching that path persists the crate registry + git deps across runs.
      - name: Cache cargo registry & git deps
        uses: actions/cache@v4
        with:
          path: |
            .cache/home/.cargo/registry/index
            .cache/home/.cargo/registry/cache
            .cache/home/.cargo/git/db
          key: cargo-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.arch }}-
      # Cache the compiled artifacts per arch. cargo fingerprinting recompiles only
      # what changed (mainly the version-bumped cosmic-comp crate); deps stay warm.
      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target/${{ matrix.target }}
          key: target-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'Dockerfile') }}
          restore-keys: |
            target-${{ matrix.arch }}-
      - name: Set release version
        run: task version:set VERSION=${{ needs.version.outputs.version }}
      - name: Build RPM
        env:
          SSH_KEY: ${{ secrets.BITBUCKET_SSH_KEY }}
        run: task docker:run TARGET=dist:all ARCH=${{ matrix.arch }} TARGET_ARCH=${{ matrix.target }}
      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: dist/*.rpm
          if-no-files-found: error
          retention-days: 1

  # 3. Publish: run semantic-release for real (with SKIP_BUILD=true so it reuses
  #    the pre-built RPMs), then push them to the package repository.
  publish:
    name: Publish release
    needs: [version, build]
    if: needs.version.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Task
        uses: go-task/setup-task@v1
      - run: npm install @semantic-release/exec @semantic-release/git @semantic-release/changelog @semantic-release/github
      - name: Download pre-built RPMs
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          merge-multiple: true
          path: dist
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_BUILD: "true"
        run: task release
      - name: Upload to package repository
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          task repo:update ARCH=x86_64 VERSION=$VERSION
          task repo:update ARCH=aarch64 VERSION=$VERSION
